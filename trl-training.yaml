apiVersion: v1
kind: ConfigMap
metadata:
  name: trl-training-script
data:
  trl-training.py: |
    #!/usr/bin/env python3
    """TRL SFT Training with Kubeflow SDK Progression Tracking.
    
    This script uses the same HTTP metrics server and callback patterns as the
    Kubeflow SDK's TransformersTrainer for automatic progression tracking.
    """

    import os
    import json
    import time
    import sys
    import signal
    import threading
    import torch
    import torch.distributed as dist
    from pathlib import Path
    from typing import Optional, Dict, Any, ClassVar
    from datetime import timedelta, datetime
    from datasets import load_dataset
    from transformers import (
        set_seed, 
        TrainerCallback, 
        TrainerState, 
        TrainerControl
    )
    import http.server
    
    # ============================================================================
    # HTTP Metrics Server (from Kubeflow SDK)
    # ============================================================================
    
    class ProgressMetricsHandler(http.server.BaseHTTPRequestHandler):
        """HTTP handler for training metrics endpoint."""
        _metrics_lock: ClassVar[threading.Lock] = threading.Lock()
        _metrics: ClassVar[Dict[str, Any]] = {
            "status": "initializing",
            "status_message": "Initializing training environment",
            "status_details": {
                "last_event": None,
                "last_event_time": None,
                "warnings": [],
            },
            "progress": {
                "step_current": 0,
                "step_total": None,
                "percent": 0.0,
                "epoch": 0,
            },
            "time": {
                "elapsed_sec": 0.0,
                "elapsed": "0s",
                "remaining_sec": None,
                "remaining": None,
                "started_sec": None,
                "started_at": None,
                "updated_sec": None,
                "updated_at": None,
            },
            "metrics": {
                "loss": None,
                "learning_rate": None,
                "throughput_samples_sec": None,
                "perplexity": None,
                "grad_norm": None,
            },
            "checkpoint": {
                "resumed_from": None,
                "last_step": None,
                "last_path": None,
                "saved_at": None,
            },
        }

        @classmethod
        def update_metrics(cls, updates: Dict[str, Any]) -> None:
            """Thread-safe metrics update."""
            with cls._metrics_lock:
                for key, value in updates.items():
                    if isinstance(value, dict) and key in cls._metrics and isinstance(cls._metrics[key], dict):
                        cls._metrics[key].update(value)
                    else:
                        cls._metrics[key] = value

        @classmethod
        def get_metrics_json(cls) -> str:
            """Thread-safe metrics retrieval."""
            with cls._metrics_lock:
                return json.dumps(cls._metrics)

        def do_GET(self):
            if self.path in ['/metrics', '/']:
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                self.wfile.write(ProgressMetricsHandler.get_metrics_json().encode('utf-8'))
            elif self.path == '/health':
                self.send_response(200)
                self.send_header('Content-Type', 'text/plain')
                self.end_headers()
                self.wfile.write(b'OK')
            else:
                self.send_response(404)
                self.end_headers()

        def log_message(self, format, *args):
            pass

    def start_metrics_server(port: int = 28080):
        """Start HTTP metrics server in background thread."""
        server = http.server.ThreadingHTTPServer(('0.0.0.0', port), ProgressMetricsHandler)
        server_thread = threading.Thread(target=server.serve_forever, daemon=True, name='metrics-server')
        server_thread.start()
        print(f"[Kubeflow] Metrics server started on port {port}", flush=True)
        return server
    
    # Fix for PyTorch weights_only loading issue with numpy objects
    try:
        import numpy as np
        torch.serialization.add_safe_globals([np.core.multiarray._reconstruct, np.ndarray])
    except (ImportError, AttributeError):
        pass
    
    _original_torch_load = torch.load
    def patched_torch_load(f, map_location=None, pickle_module=None, weights_only=None, **kwargs):
        try:
            # Auto-detect device and set appropriate map_location if not specified
            if map_location is None:
                if torch.cuda.is_available():
                    # If CUDA is available, map to current device
                    local_rank = int(os.environ.get('LOCAL_RANK', 0))
                    map_location = f'cuda:{local_rank}'
                else:
                    # If no CUDA, map to CPU
                    map_location = 'cpu'
            
            return _original_torch_load(f, map_location=map_location, pickle_module=pickle_module, weights_only=weights_only, **kwargs)
        except Exception as e:
            if "weights_only" in str(e) and weights_only is True:
                print(f"[Warning] Falling back to weights_only=False for checkpoint loading: {e}")
                return _original_torch_load(f, map_location=map_location, pickle_module=pickle_module, weights_only=False, **kwargs)
            elif "don't know how to restore data location" in str(e):
                print(f"[Warning] Device mismatch in checkpoint, forcing CPU mapping: {e}")
                return _original_torch_load(f, map_location='cpu', pickle_module=pickle_module, weights_only=False, **kwargs)
            raise
    torch.load = patched_torch_load

    try:
        from transformers.trainer_utils import get_last_checkpoint
    except ImportError:
        # Fallback for older transformers versions
        def get_last_checkpoint(output_dir):
            import os
            import re
            if not os.path.exists(output_dir):
                return None
            checkpoints = [f for f in os.listdir(output_dir) if f.startswith('checkpoint-')]
            if not checkpoints:
                return None
            # Sort by checkpoint number
            def get_checkpoint_number(name):
                match = re.search(r'checkpoint-(\d+)', name)
                return int(match.group(1)) if match else -1
            latest_checkpoint = max(checkpoints, key=get_checkpoint_number)
            return os.path.join(output_dir, latest_checkpoint)
    
    from trl import ModelConfig, ScriptArguments, SFTConfig, SFTTrainer, TrlParser, get_peft_config

    def setup_distributed():
        """Initialize distributed training with explicit process group setup."""
        # Get basic info from torchrun environment variables
        local_rank = int(os.environ.get('LOCAL_RANK', 0))
        global_rank = int(os.environ.get('RANK', 0))
        world_size = int(os.environ.get('WORLD_SIZE', 1))
        
        print(f"[Rank {global_rank}/{world_size}] [Local {local_rank}] Starting distributed training")
        
        # Set device for CUDA if available
        if torch.cuda.is_available():
            torch.cuda.set_device(local_rank)
            device_name = torch.cuda.get_device_name(local_rank)
            print(f"[Rank {global_rank}] Using GPU {local_rank}: {device_name}")
        else:
            print(f"[Rank {global_rank}] Using CPU")
        
        # Explicitly initialize process group if not already done
        # (torchrun usually handles this, but explicit is better)
        if world_size > 1 and not dist.is_initialized():
            try:
                backend = 'nccl' if torch.cuda.is_available() else 'gloo'
                dist.init_process_group(backend=backend, timeout=timedelta(minutes=30))
                print(f"[Rank {global_rank}] Initialized {backend} process group")
            except Exception as e:
                print(f"[Rank {global_rank}] Process group init failed (may already be initialized): {e}")
        
        return local_rank, global_rank, world_size

    # ============================================================================
    # Kubeflow SDK-Style Callbacks
    # ============================================================================
    
    class KubeflowProgressCallback(TrainerCallback):
        """Progress tracking callback matching SDK TransformersTrainer format."""
        
        def __init__(self):
            self._start_time = None
            self._training_started = False
            
        @staticmethod
        def _format_duration(seconds: float) -> str:
            """Format duration in seconds to human-readable format."""
            if seconds is None:
                return None
            hours = int(seconds // 3600)
            minutes = int((seconds % 3600) // 60)
            secs = int(seconds % 60)
            parts = []
            if hours > 0:
                parts.append(f"{hours}h")
            if minutes > 0:
                parts.append(f"{minutes}m")
            parts.append(f"{secs}s")
            return " ".join(parts)
        
        @staticmethod
        def _format_timestamp(timestamp: float) -> str:
            """Format Unix timestamp to ISO 8601 string."""
            if timestamp is None:
                return None
            return datetime.fromtimestamp(timestamp).strftime("%Y-%m-%d %H:%M:%S")
        
        def on_train_begin(self, args, state, control, **kwargs):
            """Initialize metrics when training begins."""
            self._start_time = time.time()
            self._training_started = True
            
            ProgressMetricsHandler.update_metrics({
                "status": "training",
                "status_message": "Training started",
                "status_details": {
                    "last_event": "training_started",
                    "last_event_time": self._format_timestamp(self._start_time),
                },
                "progress": {
                    "step_total": state.max_steps if state.max_steps > 0 else None,
                },
                "time": {
                    "started_sec": self._start_time,
                    "started_at": self._format_timestamp(self._start_time),
                },
            })
            print(f"[Kubeflow] Training started at {self._format_timestamp(self._start_time)}", flush=True)
        
        def on_step_end(self, args, state, control, **kwargs):
            """Update metrics after each training step."""
            if not self._training_started:
                return
            
            current_time = time.time()
            elapsed_sec = current_time - self._start_time
            
            # Calculate progression percentage
            progress_pct = 0.0
            if state.max_steps and state.max_steps > 0:
                progress_pct = (state.global_step / state.max_steps) * 100
            
            # Calculate ETA
            remaining_sec = None
            if state.max_steps and state.max_steps > 0 and state.global_step > 0:
                avg_time_per_step = elapsed_sec / state.global_step
                remaining_steps = state.max_steps - state.global_step
                remaining_sec = avg_time_per_step * remaining_steps
            
            # Build status message
            status_msg = f"Training in progress: {progress_pct:.1f}% complete"
            if remaining_sec:
                status_msg += f", {self._format_duration(remaining_sec)} remaining"
            
            ProgressMetricsHandler.update_metrics({
                "status_message": status_msg,
                "progress": {
                    "step_current": state.global_step,
                    "percent": round(progress_pct, 1),
                    "epoch": int(state.epoch) if state.epoch else 0,
                },
                "time": {
                    "elapsed_sec": round(elapsed_sec, 1),
                    "elapsed": self._format_duration(elapsed_sec),
                    "remaining_sec": round(remaining_sec, 1) if remaining_sec else None,
                    "remaining": self._format_duration(remaining_sec) if remaining_sec else None,
                    "updated_sec": current_time,
                    "updated_at": self._format_timestamp(current_time),
                },
            })
        
        def on_log(self, args, state, control, logs=None, **kwargs):
            """Update metrics when trainer logs."""
            if logs:
                metrics_update = {}
                if "loss" in logs:
                    metrics_update["loss"] = round(logs["loss"], 4)
                if "learning_rate" in logs:
                    metrics_update["learning_rate"] = logs["learning_rate"]
                if "train_samples_per_second" in logs:
                    metrics_update["throughput_samples_sec"] = round(logs["train_samples_per_second"], 2)
                
                # Track custom metrics (perplexity, grad_norm, etc.)
                if "perplexity" in logs:
                    metrics_update["perplexity"] = round(logs["perplexity"], 2)
                if "grad_norm" in logs:
                    metrics_update["grad_norm"] = round(logs["grad_norm"], 4)
                
                if metrics_update:
                    ProgressMetricsHandler.update_metrics({"metrics": metrics_update})
        
        def on_save(self, args, state, control, **kwargs):
            """Update checkpoint info when model is saved."""
            checkpoint_dir = args.output_dir
            checkpoint_step = state.global_step
            checkpoint_path = f"{checkpoint_dir}/checkpoint-{checkpoint_step}"
            
            ProgressMetricsHandler.update_metrics({
                "status_details": {
                    "last_event": "checkpoint_saved",
                    "last_event_time": self._format_timestamp(time.time()),
                },
                "checkpoint": {
                    "last_step": checkpoint_step,
                    "last_path": checkpoint_path,
                    "saved_at": self._format_timestamp(time.time()),
                },
            })
            print(f"[Kubeflow] Checkpoint saved: {checkpoint_path}", flush=True)
        
        def on_train_end(self, args, state, control, **kwargs):
            """Finalize metrics when training completes."""
            elapsed_sec = time.time() - self._start_time if self._start_time else 0
            
            ProgressMetricsHandler.update_metrics({
                "status": "completed",
                "status_message": f"Training completed successfully in {self._format_duration(elapsed_sec)}",
                "status_details": {
                    "last_event": "training_completed",
                    "last_event_time": self._format_timestamp(time.time()),
                },
                "progress": {
                    "percent": 100.0,
                },
            })
            print(f"[Kubeflow] Training completed in {self._format_duration(elapsed_sec)}", flush=True)
    
    
    class KubeflowCheckpointCallback(TrainerCallback):
        """SIGTERM handler for graceful checkpointing matching SDK format."""
        
        def __init__(self, checkpoint_dir: str = "./checkpoints", auto_resume: bool = True):
            self.checkpoint_dir = checkpoint_dir
            self.auto_resume = auto_resume
            self._trainer_ref = None
            self._checkpoint_timeout = 25  # 25s before SIGKILL
            self._setup_signal_handlers()
        
        @staticmethod
        def _format_timestamp(timestamp: float) -> str:
            """Format Unix timestamp to ISO 8601 string."""
            if timestamp is None:
                return None
            return datetime.fromtimestamp(timestamp).strftime("%Y-%m-%d %H:%M:%S")
        
        def _setup_signal_handlers(self):
            """Setup SIGTERM handler for graceful shutdown."""
            def checkpoint_handler(signum, frame):
                signal_name = "SIGTERM" if signum == signal.SIGTERM else f"signal {signum}"
                print(f"[Kubeflow] Received {signal_name}, initiating graceful shutdown...", flush=True)
                
                ProgressMetricsHandler.update_metrics({
                    "status": "shutting_down",
                    "status_message": f"Graceful shutdown initiated ({signal_name})",
                    "status_details": {
                        "last_event": "shutdown_signal_received",
                        "last_event_time": self._format_timestamp(time.time()),
                    }
                })
                
                if self._trainer_ref is not None:
                    def save_with_timeout():
                        try:
                            print("[Kubeflow] Saving checkpoint before shutdown...", flush=True)
                            ProgressMetricsHandler.update_metrics({
                                "status_message": "Saving checkpoint before shutdown..."
                            })
                            
                            self._trainer_ref.save_checkpoint()
                            
                            checkpoint_step = self._trainer_ref.state.global_step
                            checkpoint_path = f"{self.checkpoint_dir}/checkpoint-{checkpoint_step}"
                            success_msg = f"Checkpoint saved successfully at step {checkpoint_step} before shutdown"
                            
                            print(f"[Kubeflow] {success_msg}", flush=True)
                            ProgressMetricsHandler.update_metrics({
                                "status": "shutdown_complete",
                                "status_message": success_msg,
                                "status_details": {
                                    "last_event": "checkpoint_saved_on_shutdown",
                                    "last_event_time": self._format_timestamp(time.time()),
                                },
                                "checkpoint": {
                                    "last_step": checkpoint_step,
                                    "last_path": checkpoint_path,
                                    "saved_at": self._format_timestamp(time.time()),
                                }
                            })
                        except Exception as e:
                            error_msg = f"Failed to save checkpoint on shutdown: {str(e)}"
                            print(f"[Kubeflow] {error_msg}", flush=True)
                            ProgressMetricsHandler.update_metrics({
                                "status": "shutdown_error",
                                "status_message": error_msg,
                            })
                    
                    checkpoint_thread = threading.Thread(target=save_with_timeout, daemon=True)
                    checkpoint_thread.start()
                    checkpoint_thread.join(timeout=self._checkpoint_timeout)
                    
                    if checkpoint_thread.is_alive():
                        print(f"[Kubeflow] Warning: Checkpoint save timed out after {self._checkpoint_timeout}s", flush=True)
                
                sys.exit(0)
            
            signal.signal(signal.SIGTERM, checkpoint_handler)
            signal.signal(signal.SIGINT, checkpoint_handler)
    
    # ============================================================================
    # Helper Functions
    # ============================================================================
    
    def setup_args():
        """Convert environment variables to command line arguments."""
        if '--dataset_name' not in sys.argv:
                if self.shutdown_requested:
                    return  # Already handling shutdown
                self.shutdown_requested = True
            
            print(f"[Preemption] Signal {signum} received, initiating graceful shutdown...")
            
            # Run shutdown in separate thread to avoid signal handler deadlocks
            shutdown_thread = threading.Thread(target=self._do_shutdown, daemon=False)
            shutdown_thread.start()
            shutdown_thread.join(timeout=60)  # Max 60s for shutdown
            
            print(f"[Preemption] Shutdown complete")
            sys.exit(0)
        
        def _do_shutdown(self):
            """Perform actual shutdown operations in separate thread."""
            try:
                # Write preemption status
                if self.progression_callback and self.progression_callback.global_rank == 0:
                    try:
                        current_time = time.time()
                        trainer_state = getattr(self.trainer, 'state', None)
                        
                        status = {
                            "message": "Training preempted - progress saved",
                            "timestamp": int(current_time),
                            "start_time": int(self.progression_callback.start_time),
                            "current_step": getattr(trainer_state, 'global_step', 0) if trainer_state else 0,
                            "total_steps": getattr(trainer_state, 'max_steps', 0) if trainer_state else 0,
                            "percentage_complete": "preempted",
                            "estimated_time_remaining": "unknown",
                            "training_metrics": {"status": "preempted"}
                        }
                        
                        temp_file = f"{self.progression_callback.status_file}.tmp"
                        with open(temp_file, 'w') as f:
                            json.dump(status, f, indent=2)
                        os.rename(temp_file, self.progression_callback.status_file)
                        print(f"[Preemption] Status saved")
                        
                    except Exception as e:
                        print(f"[Preemption] Failed to save status: {e}")
                
                # Request trainer to stop gracefully (sets control.should_training_stop)
                # This is safer than forcing save_model during active training
                if self.trainer and hasattr(self.trainer, 'control'):
                    self.trainer.control.should_training_stop = True
                    print(f"[Preemption] Requested training stop")
                
                # Wait for controller to capture status
                capture_wait = int(os.getenv('PREEMPTION_CAPTURE_WAIT', '30'))
                print(f"[Preemption] Waiting {capture_wait}s for status capture...")
                time.sleep(capture_wait)
                
            except Exception as e:
                print(f"[Preemption] Shutdown error: {e}")

    class EnhancedProgressionCallback(TrainerCallback):
        """Enhanced callback for distributed training progress tracking with checkpoint monitoring."""
        
        def __init__(self, global_rank: int = 0, resume_from_step: int = 0, training_start_time: Optional[float] = None, checkpoint_dir: str = "/workspace/checkpoints"):
            self.status_file = os.getenv("TRAINJOB_PROGRESSION_FILE_PATH", "/tmp/training_progression.json")
            self.global_rank = global_rank
            self.last_update_time = time.time()
            self.update_interval = int(os.getenv('PROGRESSION_UPDATE_INTERVAL', '30'))
            self.resume_from_step = resume_from_step
            self.checkpoint_dir = checkpoint_dir
            
            # Track when current training session started (not when original training started)
            self.session_start_time = time.time()
            
            # Track actual training time across all sessions
            if training_start_time:
                # Loaded from checkpoint - this is the cumulative training time
                self.total_training_time = training_start_time
            else:
                # New training - start from zero
                self.total_training_time = 0.0
            
            # Track steps at session start for accurate ETA
            self.session_start_step = resume_from_step
            
        def on_log(self, args, state: TrainerState, control: TrainerControl, **kwargs):
            """Write progress on each log event with rank-aware logging."""
            # All ranks log their progress for visibility
            node_rank = int(os.environ.get('PET_NODE_RANK', 0))
            local_rank = int(os.environ.get('LOCAL_RANK', 0))
            world_size = int(os.environ.get('WORLD_SIZE', 1))
            
            # Calculate ETA for display (rank 0 only to avoid redundant calculations)
            eta_str = ""
            if self.global_rank == 0:
                current_time = time.time()
                session_elapsed = current_time - self.session_start_time
                steps_in_session = state.global_step - self.session_start_step
                
                if steps_in_session > 0 and session_elapsed > 0:
                    time_per_step = session_elapsed / steps_in_session
                    
                    # Calculate remaining steps
                    if state.max_steps > 0:
                        remaining_steps = state.max_steps - state.global_step
                    else:
                        # For epoch-based, estimate steps per epoch
                        if state.epoch > 0:
                            steps_per_epoch = state.global_step / state.epoch
                            remaining_epochs = state.num_train_epochs - state.epoch
                            remaining_steps = int(remaining_epochs * steps_per_epoch)
                        else:
                            remaining_steps = 0
                    
                    eta_seconds = int(remaining_steps * time_per_step)
                    eta_str = f", ETA: {self._format_eta(eta_seconds)}"
                else:
                    eta_str = ", ETA: calculating..."
            
            # Log from all ranks for distributed training visibility
            if state.log_history and len(state.log_history) > 0:
                latest = state.log_history[-1]
                loss = latest.get('train_loss', latest.get('loss', 0.0))
                lr = latest.get('learning_rate', 0.0)
                
                # Display epoch info for epoch-based training, steps for step-based
                if state.max_steps > 0:
                    print(f"[Node {node_rank}] [Rank {self.global_rank}/{world_size}] [Local {local_rank}] Step {state.global_step}/{state.max_steps} - Loss: {loss:.4f}, LR: {lr:.6f}{eta_str}")
                else:
                    print(f"[Node {node_rank}] [Rank {self.global_rank}/{world_size}] [Local {local_rank}] Epoch {state.epoch:.2f}/{state.num_train_epochs} - Loss: {loss:.4f}, LR: {lr:.6f}{eta_str}")
            
            # Only rank 0 writes progress file
            if self.global_rank != 0:
                return
                
            current_time = time.time()
            if current_time - self.last_update_time < self.update_interval:
                return  # Throttle updates
                
            try:
                # Calculate progress based on steps or epochs
                if state.max_steps > 0:
                    # Step-based training
                    progress = (state.global_step / state.max_steps * 100)
                    total_units = state.max_steps
                    current_units = state.global_step
                    unit_type = "steps"
                else:
                    # Epoch-based training
                    progress = (state.epoch / state.num_train_epochs * 100) if state.num_train_epochs > 0 else 0
                    total_units = int(state.num_train_epochs) if state.num_train_epochs else 0
                    current_units = state.epoch
                    unit_type = "epochs"
                
                # Calculate cumulative training time
                session_elapsed = current_time - self.session_start_time
                cumulative_training_time = self.total_training_time + session_elapsed
                
                # ETA calculation based on current session performance
                steps_in_session = state.global_step - self.session_start_step
                
                if steps_in_session > 0 and session_elapsed > 0:
                    # Calculate time per step in current session
                    time_per_step = session_elapsed / steps_in_session
                    
                    # Calculate remaining steps
                    if state.max_steps > 0:
                        remaining_steps = state.max_steps - state.global_step
                    else:
                        # For epoch-based, estimate steps per epoch
                        if state.epoch > 0:
                            steps_per_epoch = state.global_step / state.epoch
                            remaining_epochs = state.num_train_epochs - state.epoch
                            remaining_steps = int(remaining_epochs * steps_per_epoch)
                        else:
                            remaining_steps = 0
                    
                    eta_seconds = int(remaining_steps * time_per_step)
                    eta_formatted = self._format_eta(eta_seconds)
                else:
                    eta_formatted = "calculating..."
                
                # Get latest metrics from state
                training_metrics = {}
                if state.log_history:
                    latest = state.log_history[-1]
                    training_metrics["loss"] = f"{latest.get('train_loss', latest.get('loss', 0.0)):.4f}"
                    training_metrics["learning_rate"] = f"{latest.get('learning_rate', 0.0):.6f}"
                
                # Monitor checkpoint directory
                self._update_checkpoint_info(training_metrics)
                
                # Build status with epoch or step info
                message_text = f"Training epoch {state.epoch:.2f}/{state.num_train_epochs}" if state.max_steps <= 0 else f"Training step {state.global_step}/{state.max_steps}"
                
                status = {
                    "message": message_text,
                    "timestamp": int(current_time),
                    "cumulative_training_time": int(cumulative_training_time),
                    "current_step": state.global_step,
                    "total_steps": state.max_steps if state.max_steps > 0 else -1,
                    "current_epoch": float(state.epoch) if state.epoch else 0.0,
                    "total_epochs": int(state.num_train_epochs) if state.num_train_epochs else 1,
                    "percentage_complete": f"{progress:.2f}",
                    "estimated_time_remaining": eta_formatted,
                    "training_metrics": training_metrics
                }
                
                # Atomic write
                temp_file = f"{self.status_file}.tmp"
                with open(temp_file, 'w') as f:
                    json.dump(status, f, indent=2)
                os.rename(temp_file, self.status_file)
                self.last_update_time = current_time
                
            except Exception as e:
                print(f"Failed to write progress: {e}")
        
        def _format_eta(self, eta_seconds: int) -> str:
            """Format ETA seconds into human readable format."""
            days, hours, minutes, seconds = (
                eta_seconds // 86400, 
                (eta_seconds % 86400) // 3600,
                (eta_seconds % 3600) // 60, 
                eta_seconds % 60
            )
            eta_formatted = ""
            if days > 0: eta_formatted += f"{days}d"
            if hours > 0: eta_formatted += f"{hours}h"
            if minutes > 0: eta_formatted += f"{minutes}m"
            if seconds > 0 or eta_formatted == "": eta_formatted += f"{seconds}s"
            return eta_formatted
        
        def _update_checkpoint_info(self, training_metrics: dict):
            """Update checkpoint information in training metrics."""
            try:
                if os.path.exists(self.checkpoint_dir):
                    checkpoints = [f for f in os.listdir(self.checkpoint_dir) if f.startswith('checkpoint-')]
                    if checkpoints:
                        training_metrics["checkpoints_stored"] = str(len(checkpoints))
                        
                        # Find latest checkpoint by highest number
                        def get_checkpoint_number(checkpoint_name):
                            try:
                                return int(checkpoint_name.split('-')[1])
                            except (IndexError, ValueError):
                                return -1
                        
                        latest_checkpoint_name = max(checkpoints, key=get_checkpoint_number)
                        latest_checkpoint_path = os.path.join(self.checkpoint_dir, latest_checkpoint_name)
                        training_metrics["latest_checkpoint_path"] = latest_checkpoint_path
            except (OSError, ValueError) as e:
                print(f"Warning: Failed to update checkpoint info: {e}")
        
        def on_save(self, args, state, control, **kwargs):
            """Save cumulative training time to checkpoint for accurate resume progress tracking."""
            if self.global_rank == 0:
                try:
                    # Calculate and save cumulative training time
                    current_time = time.time()
                    session_elapsed = current_time - self.session_start_time
                    cumulative_time = self.total_training_time + session_elapsed
                    
                    checkpoint_dir = args.output_dir
                    latest_checkpoint = f"checkpoint-{state.global_step}"
                    checkpoint_path = os.path.join(checkpoint_dir, latest_checkpoint)
                    
                    if os.path.exists(checkpoint_path):
                        # Save to a separate file to avoid conflicts with transformers
                        training_info_path = os.path.join(checkpoint_path, 'training_info.json')
                        training_info = {
                            'cumulative_training_time': cumulative_time,
                            'checkpoint_step': state.global_step,
                            'checkpoint_epoch': float(state.epoch) if state.epoch else 0.0,
                            'saved_at': current_time
                        }
                        
                        with open(training_info_path, 'w') as f:
                            json.dump(training_info, f, indent=2)
                        
                        print(f"[Rank {self.global_rank}] Saved training info to checkpoint (cumulative time: {cumulative_time:.0f}s)")
                except Exception as e:
                    print(f"Failed to save training info to checkpoint: {e}")
        
        def on_train_end(self, args, state, control, **kwargs):
            """Mark training as completed with final metrics."""
            if self.global_rank == 0:
                try:
                    current_time = time.time()
                    session_elapsed = current_time - self.session_start_time
                    cumulative_time = self.total_training_time + session_elapsed
                    
                    # Get final training metrics
                    final_metrics = {}
                    if state.log_history:
                        latest = state.log_history[-1]
                        final_metrics["final_loss"] = f"{latest.get('train_loss', latest.get('loss', 0.0)):.4f}"
                        final_metrics["final_learning_rate"] = f"{latest.get('learning_rate', 0.0):.6f}"
                        
                        # Include eval metrics if available
                        eval_loss = latest.get('eval_loss')
                        if eval_loss is not None:
                            final_metrics["final_eval_loss"] = f"{eval_loss:.4f}"
                    
                    status = {
                        "message": "Training completed successfully",
                        "timestamp": int(current_time),
                        "cumulative_training_time": int(cumulative_time),
                        "current_step": state.global_step,
                        "total_steps": state.max_steps if state.max_steps > 0 else -1,
                        "current_epoch": float(state.epoch) if state.epoch else state.num_train_epochs,
                        "total_epochs": int(state.num_train_epochs),
                        "percentage_complete": "100.00",
                        "estimated_time_remaining": "0s",
                        "training_metrics": final_metrics
                    }
                    
                    temp_file = f"{self.status_file}.tmp"
                    with open(temp_file, 'w') as f:
                        json.dump(status, f, indent=2)
                    os.rename(temp_file, self.status_file)
                    
                    capture_wait = int(os.getenv('COMPLETION_CAPTURE_WAIT', '30'))
                    print(f"Training completed. Waiting {capture_wait}s for status capture...")
                    time.sleep(capture_wait)
                    
                except Exception as e:
                    print(f"Failed to write completion status: {e}")


    def setup_args():
        """Convert environment variables to command line arguments."""
        if '--dataset_name' not in sys.argv:
            # Required arguments
            sys.argv.extend(['--dataset_name', os.getenv('DATASET_NAME', 'tatsu-lab/alpaca')])
            sys.argv.extend(['--output_dir', '/workspace/checkpoints'])
            
            # Training arguments from environment
            env_mappings = [
                ('MODEL_NAME', '--model_name_or_path'),
                ('LEARNING_RATE', '--learning_rate'),
                ('BATCH_SIZE', '--per_device_train_batch_size'),
                ('MAX_EPOCHS', '--num_train_epochs'),
                ('SAVE_STEPS', '--save_steps'),
                ('LOGGING_STEPS', '--logging_steps'),
                ('GRADIENT_ACCUMULATION_STEPS', '--gradient_accumulation_steps'),
                ('WARMUP_STEPS', '--warmup_steps'),
                ('MAX_SEQ_LENGTH', '--max_seq_length'),
            ]
            
            for env_var, arg_name in env_mappings:
                value = os.getenv(env_var)
                if value:
                    sys.argv.extend([arg_name, value])
            
            # LoRA configuration
            if os.getenv('LORA_R'):
                sys.argv.extend(['--use_peft', '--lora_r', os.getenv('LORA_R')])
                if os.getenv('LORA_ALPHA'):
                    sys.argv.extend(['--lora_alpha', os.getenv('LORA_ALPHA')])
                if os.getenv('LORA_DROPOUT'):
                    sys.argv.extend(['--lora_dropout', os.getenv('LORA_DROPOUT')])
            
            # Let TRL/Transformers handle epoch-based training automatically
            # This avoids confusion with step calculations in distributed training
            print(f"Using epoch-based training: {os.getenv('MAX_EPOCHS')} epochs")


    def load_datasets():
        """Load training and evaluation datasets."""
        # Try dataset initializer first
        dataset_path = Path("/workspace/dataset")
        if dataset_path.exists():
            try:
                from datasets import DatasetDict, Dataset
                dataset = load_from_disk(str(dataset_path))
                print(f"Loaded dataset from initializer: {dataset_path}")
                
                # Check if it's a DatasetDict with train/test splits
                if isinstance(dataset, DatasetDict):
                    if 'train' in dataset and 'test' in dataset:
                        return dataset
                    elif 'train' in dataset:
                        # Only train split exists, need to create test split
                        train_data = dataset['train']
                    else:
                        # Unknown structure, use first split
                        train_data = dataset[list(dataset.keys())[0]]
                elif isinstance(dataset, Dataset):
                    # Single dataset, need to split
                    train_data = dataset
                else:
                    raise ValueError(f"Unexpected dataset type: {type(dataset)}")
                
                # Apply train/test splits from environment variables
                train_split_spec = os.getenv('DATASET_TRAIN_SPLIT', 'train[:500]')
                test_split_spec = os.getenv('DATASET_TEST_SPLIT', 'train[500:520]')
                
                # Parse split specifications (e.g., "train[:500]" -> slice(None, 500))
                train_match = re.search(r'\[(\d*):(\d*)\]', train_split_spec)
                test_match = re.search(r'\[(\d*):(\d*)\]', test_split_spec)
                
                if train_match:
                    train_start = int(train_match.group(1)) if train_match.group(1) else 0
                    train_end = int(train_match.group(2)) if train_match.group(2) else len(train_data)
                    train_dataset = train_data.select(range(train_start, min(train_end, len(train_data))))
                else:
                    train_dataset = train_data.select(range(500))  # Default: first 500
                
                if test_match:
                    test_start = int(test_match.group(1)) if test_match.group(1) else 0
                    test_end = int(test_match.group(2)) if test_match.group(2) else len(train_data)
                    test_dataset = train_data.select(range(test_start, min(test_end, len(train_data))))
                else:
                    test_dataset = train_data.select(range(500, 520))  # Default: 500-520
                
                print(f"Split initialized dataset - Train: {len(train_dataset)}, Test: {len(test_dataset)}")
                return {'train': train_dataset, 'test': test_dataset}
                
            except Exception as e:
                print(f"Failed to load dataset from {dataset_path}: {e}, falling back to HuggingFace")
        
        # Load from HuggingFace
        dataset_name = os.getenv('DATASET_NAME', 'tatsu-lab/alpaca')
        train_split = os.getenv('DATASET_TRAIN_SPLIT', 'train[:500]')
        test_split = os.getenv('DATASET_TEST_SPLIT', 'train[500:520]')
        
        print(f"Loading dataset from HuggingFace: {dataset_name}")
        train_dataset = load_dataset(dataset_name, split=train_split)
        test_dataset = load_dataset(dataset_name, split=test_split)
        
        return {'train': train_dataset, 'test': test_dataset}


    def main():
        """Main training function for distributed GPT-2 fine-tuning with LoRA."""
        # Setup distributed training
        local_rank, global_rank, world_size = setup_distributed()
        
        print(f"[Rank {global_rank}/{world_size}] Starting TRL training")
        
        # Create cache directories and setup arguments
        os.makedirs("/workspace/cache/transformers", exist_ok=True)
        os.makedirs("/workspace/cache", exist_ok=True)
        os.makedirs("/workspace/cache/datasets", exist_ok=True)
        
        setup_args()
        parser = TrlParser((ScriptArguments, SFTConfig, ModelConfig))
        script_args, training_args, model_config = parser.parse_args_and_config()
        set_seed(training_args.seed)
        
        # Create output directory
        checkpoint_dir = Path(training_args.output_dir)
        os.makedirs(checkpoint_dir, exist_ok=True)
        
        # Load datasets
        datasets = load_datasets()
        train_dataset = datasets['train']
        eval_dataset = datasets.get('test', train_dataset)
        print(f"[Rank {global_rank}/{world_size}] Dataset loaded - Train: {len(train_dataset)}, Eval: {len(eval_dataset)}")
        
        # Configure PEFT and initialize trainer
        peft_config = get_peft_config(model_config) if model_config.use_peft else None
        peft_status = "LoRA enabled" if peft_config else "Full fine-tuning"
        print(f"[Rank {global_rank}/{world_size}] Model: {model_config.model_name_or_path} ({peft_status})")
        
        trainer = SFTTrainer(
            model=model_config.model_name_or_path,
            args=training_args,
            train_dataset=train_dataset,
            eval_dataset=eval_dataset,
            peft_config=peft_config,
            callbacks=[]
        )
        
        # Print trainable parameters (main process only)
        if trainer.accelerator.is_main_process and hasattr(trainer.model, "print_trainable_parameters"):
            trainer.model.print_trainable_parameters()
        
        # Checkpoint detection and resume logic (only rank 0 checks to avoid race conditions)
        checkpoint = None
        resume_from_step = 0
        cumulative_training_time = None
        resume_info = {}
        
        if global_rank == 0:
            checkpoint = get_last_checkpoint(training_args.output_dir)
        
        # Broadcast checkpoint path to all ranks
        if world_size > 1 and dist.is_initialized():
            checkpoint_list = [checkpoint]
            dist.broadcast_object_list(checkpoint_list, src=0)
            checkpoint = checkpoint_list[0]
        
        if checkpoint is not None:
            try:
                # Validate checkpoint directory structure
                trainer_state_file = os.path.join(checkpoint, 'trainer_state.json')
                model_files = [
                    'pytorch_model.bin',
                    'model.safetensors', 
                    'adapter_model.bin',  # For LoRA/PEFT models
                    'adapter_model.safetensors'
                ]
                
                model_file_exists = any(os.path.exists(os.path.join(checkpoint, f)) for f in model_files)
                
                if not os.path.exists(trainer_state_file):
                    print(f"[Rank {global_rank}/{world_size}] Invalid checkpoint: missing trainer_state.json")
                    checkpoint = None
                elif not model_file_exists:
                    print(f"[Rank {global_rank}/{world_size}] Invalid checkpoint: no model files found")
                    checkpoint = None
                else:
                    # Load trainer state
                    with open(trainer_state_file, 'r') as f:
                        trainer_state = json.load(f)
                        resume_from_step = int(trainer_state.get('global_step', 0))
                        resume_info = {
                            'global_step': resume_from_step,
                            'epoch': trainer_state.get('epoch', 0),
                            'total_flos': trainer_state.get('total_flos', 0),
                            'train_batch_size': trainer_state.get('train_batch_size', training_args.per_device_train_batch_size),
                            'learning_rate': trainer_state.get('log_history', [{}])[-1].get('learning_rate', training_args.learning_rate) if trainer_state.get('log_history') else training_args.learning_rate,
                            'loss': trainer_state.get('log_history', [{}])[-1].get('train_loss', 'N/A') if trainer_state.get('log_history') else 'N/A'
                        }
                    
                    # Load cumulative training time if available
                    training_info_path = os.path.join(checkpoint, 'training_info.json')
                    if os.path.exists(training_info_path):
                        with open(training_info_path, 'r') as f:
                            training_info = json.load(f)
                            cumulative_training_time = training_info.get('cumulative_training_time', 0.0)
                            
                            # Validate checkpoint consistency
                            saved_step = training_info.get('checkpoint_step', 0)
                            if saved_step != resume_from_step:
                                print(f"[Rank {global_rank}/{world_size}] Warning: Checkpoint step mismatch (training_info: {saved_step}, trainer_state: {resume_from_step})")
                    
                    # Calculate training progress
                    current_epoch = resume_info['epoch']
                    target_epochs = training_args.num_train_epochs
                    progress_pct = (current_epoch / target_epochs * 100) if target_epochs > 0 else 0
                    remaining_epochs = max(0, target_epochs - current_epoch)
                    
                    print(f"[Rank {global_rank}/{world_size}] ===== RESUMING TRAINING =====")
                    print(f"[Rank {global_rank}/{world_size}] Checkpoint: {checkpoint}")
                    print(f"[Rank {global_rank}/{world_size}] Resuming from step: {resume_from_step}")
                    print(f"[Rank {global_rank}/{world_size}] Resuming from epoch: {current_epoch:.2f}/{target_epochs} ({progress_pct:.1f}% complete)")
                    if cumulative_training_time:
                        print(f"[Rank {global_rank}/{world_size}] Cumulative training time: {cumulative_training_time:.0f}s")
                    print(f"[Rank {global_rank}/{world_size}] Last recorded loss: {resume_info['loss']}")
                    print(f"[Rank {global_rank}/{world_size}] Last learning rate: {resume_info['learning_rate']:.6f}")
                    print(f"[Rank {global_rank}/{world_size}] Remaining epochs: {remaining_epochs:.2f}")
                    print(f"[Rank {global_rank}/{world_size}] =============================")
            except Exception as e:
                print(f"[Rank {global_rank}/{world_size}] Checkpoint load failed: {e}")
                checkpoint = None
        
        if checkpoint is None:
            print(f"[Rank {global_rank}/{world_size}] ===== STARTING NEW TRAINING =====")
            print(f"[Rank {global_rank}/{world_size}] No checkpoint found, starting from scratch")
            print(f"[Rank {global_rank}/{world_size}] Total steps planned: {training_args.max_steps}")
            print(f"[Rank {global_rank}/{world_size}] Total epochs planned: {training_args.num_train_epochs}")
            print(f"[Rank {global_rank}/{world_size}] ==================================")
        
        # Setup callbacks and handlers
        progression_callback = EnhancedProgressionCallback(
            global_rank=global_rank, 
            resume_from_step=resume_from_step, 
            training_start_time=cumulative_training_time,  # Pass cumulative time, not start time
            checkpoint_dir=str(checkpoint_dir)
        )
        trainer.add_callback(progression_callback)
        
        preemption_handler = PreemptionHandler(trainer=trainer, progression_callback=progression_callback)
        
        # Start or resume training
        if checkpoint is not None:
            print(f"[Rank {global_rank}/{world_size}] RESUMING training from checkpoint - Target Epochs: {training_args.num_train_epochs}, Current LR: {resume_info.get('learning_rate', training_args.learning_rate):.6f}")
        else:
            print(f"[Rank {global_rank}/{world_size}] STARTING new training - Epochs: {training_args.num_train_epochs}, Initial LR: {training_args.learning_rate}")
        
        trainer.train(resume_from_checkpoint=checkpoint)
        
        # Save model and cleanup
        if trainer.accelerator.is_main_process:
            trainer.save_model()
            print(f"[Rank {global_rank}/{world_size}] Model saved")
        
        print(f"[Rank {global_rank}/{world_size}] Training completed")


    if __name__ == "__main__":
        main()

