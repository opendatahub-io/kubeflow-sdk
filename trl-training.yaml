apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: torch-cuda-251-runtime
  labels:
    trainer.kubeflow.org/framework: torch
    project: trl-demo
spec:
  mlPolicy:
    numNodes: 2
    torch:
      numProcPerNode: auto
  template:
    spec:
      replicatedJobs:
        # Dataset Initializer
        - name: dataset-initializer
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: dataset-initializer
            spec:
              template:
                spec:
                  restartPolicy: Never
                  containers:
                    - name: dataset-initializer
                      image: ghcr.io/kubeflow/trainer/dataset-initializer:v2.0.0
                      env:
                        - name: STORAGE_URI
                          value: "hf://tatsu-lab/alpaca"
                        - name: HF_HOME
                          value: "/workspace/cache"
                        - name: DATASET_NAME
                          value: "tatsu-lab/alpaca"
                        - name: DATASET_CONFIG
                          value: "main"
                        - name: DATASET_SPLIT
                          value: "train[:500]"
                        - name: DATASET_FORMAT
                          value: "json"
                      resources:
                        limits:
                          cpu: "2"
                          memory: "4Gi"
                        requests:
                          cpu: "1"
                          memory: "2Gi"
                      volumeMounts:
                        - name: shared-workspace
                          mountPath: /workspace
                  volumes:
                    - name: shared-workspace
                      persistentVolumeClaim:
                        claimName: shared-checkpoint-storage

        # Model Initializer
        - name: model-initializer
          dependsOn:
            - name: dataset-initializer
              status: Complete
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: model-initializer
            spec:
              template:
                spec:
                  restartPolicy: Never
                  containers:
                    - name: model-initializer
                      image: ghcr.io/kubeflow/trainer/model-initializer:v2.0.0
                      env:
                        - name: STORAGE_URI
                          value: "hf://gpt2"
                        - name: HF_HOME
                          value: "/workspace/cache"
                        - name: MODEL_NAME
                          value: "gpt2"
                        - name: MODEL_REVISION
                          value: "main"
                        - name: DOWNLOAD_MODE
                          value: "force_redownload"
                      resources:
                        limits:
                          cpu: "2"
                          memory: "4Gi"
                        requests:
                          cpu: "1"
                          memory: "2Gi"
                      volumeMounts:
                        - name: shared-workspace
                          mountPath: /workspace
                  volumes:
                    - name: shared-workspace
                      persistentVolumeClaim:
                        claimName: shared-checkpoint-storage

        # Training Node
        - name: node
          dependsOn:
            - name: model-initializer
              status: Complete
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: trainer
            spec:
              template:
                spec:
                  containers:
                    - name: node
                      image: quay.io/modh/training:py311-cuda124-torch251
                      volumeMounts:
                        - name: shared-workspace
                          mountPath: /workspace
                        - name: training-script
                          mountPath: /workspace/trl-training.py
                          subPath: trl-training.py
                      env:
                        - name: PYTHONUNBUFFERED
                          value: "1"
                        - name: HF_HOME
                          value: "/workspace/cache"
                        - name: TRAINJOB_PROGRESSION_FILE_PATH
                          value: "/tmp/training_progression.json"
                        - name: PROGRESSION_UPDATE_INTERVAL
                          value: "30"
                        - name: CHECKPOINT_DIR
                          value: "/workspace/checkpoints"
                        
                      command: ["bash", "-c"]
                      args:
                        - |
                          if ! [ -x "$(command -v pip)" ]; then
                              python -m ensurepip || python -m ensurepip || apt-get install python-pip
                          fi
                          
                          PIP_DISABLE_PIP_VERSION_CHECK=1 python -m pip install --no-warn-script-location \
                            --index-url https://pypi.org/simple \
                            trl datasets
                          
                          # Use torchrun for multi-process distributed training
                          torchrun \
                            --nnodes=${PET_NNODES:-1} \
                            --nproc-per-node=${PET_NPROC_PER_NODE:-1} \
                            --node-rank=${PET_NODE_RANK:-0} \
                            --master-addr=${PET_MASTER_ADDR:-localhost} \
                            --master-port=${PET_MASTER_PORT:-29500} \
                            /workspace/trl-training.py
                      resources:
                        requests:
                          cpu: "1"
                          memory: "2Gi"
                        limits:
                          cpu: "2"
                          memory: "4Gi"
                  volumes:
                    - name: shared-workspace
                      persistentVolumeClaim:
                        claimName: shared-checkpoint-storage
                    - name: training-script
                      configMap:
                        name: trl-training-script

