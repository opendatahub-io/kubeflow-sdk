apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: trl-demo
  labels:
    kueue.x-k8s.io/queue-name: test-lq
    app.kubernetes.io/name: "trl-demo"
    app.kubernetes.io/component: "training"
    experiment: "simplified-trl-training"
  annotations:
    # Progression tracking configuration (SDK TransformersTrainer format)
    trainer.odh.org/progression-tracking: "enabled"
    trainer.odh.org/metrics-port: "28080"
    trainer.odh.org/metrics-poll-interval: "30"
    trainer.odh.org/framework: "transformers"
spec:
  runtimeRef:
    apiGroup: trainer.kubeflow.org
    kind: TrainingRuntime
    name: torch-cuda-251-runtime
  trainer:
    numNodes: 2
    numProcPerNode: 2
    resourcesPerNode:
      requests:
        cpu: "2"
        memory: "4Gi"
      limits:
        cpu: "4"
        memory: "8Gi"
    # Training hyperparameters
    env:
      # PyTorch compilation control
      - name: TORCH_COMPILE_DISABLE
        value: "1"
      
      # Force CPU training
      - name: CUDA_VISIBLE_DEVICES
        value: ""
      
      - name: LEARNING_RATE
        value: "5e-5"
      - name: BATCH_SIZE
        value: "1"
      - name: MAX_EPOCHS
        value: "5"
      - name: WARMUP_STEPS
        value: "5"
      - name: SAVE_STEPS
        value: "5"
      - name: LOGGING_STEPS
        value: "2"
      - name: GRADIENT_ACCUMULATION_STEPS
        value: "2"
      # Model configuration
      - name: MODEL_NAME
        value: "gpt2"
      - name: LORA_R
        value: "16"
      - name: LORA_ALPHA
        value: "32"
      - name: LORA_DROPOUT
        value: "0.1"
      - name: MAX_SEQ_LENGTH
        value: "512"
      
      # Dataset configuration
      - name: DATASET_NAME
        value: "tatsu-lab/alpaca"
      - name: DATASET_TRAIN_SPLIT
        value: "train[:500]"
