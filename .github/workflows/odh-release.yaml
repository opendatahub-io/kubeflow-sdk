name: ODH Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.3.0+rhaiv.1)'
        required: true
        type: string
      branch:
        description: "Release branch to create or update (e.g., release-0.2)"
        required: true
        type: string
      acknowledge_cve_risk:
        description: >-
          Set to true to proceed with the release even if Snyk detects
          High or Critical CVEs (e.g., after human review determines
          they do not affect the SDK).
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  security-events: write

jobs:
  # Security gate: must pass before any release work begins.
  # Blocks on High/Critical CVEs unless the operator explicitly sets
  # acknowledge_cve_risk=true after reviewing the findings.
  snyk-scan:
    name: Security gate
    if: ${{ github.repository == 'opendatahub-io/kubeflow-sdk' }}
    uses: ./.github/workflows/snyk-security-scan.yaml
    with:
      fail_on_cves: ${{ !inputs.acknowledge_cve_risk }}
      sarif_category: odh-release-snyk-audit
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  prepare:
    name: Prepare release branch
    needs: [snyk-scan]  # Gated behind the security scan
    if: ${{ github.repository == 'opendatahub-io/kubeflow-sdk' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      branch: ${{ steps.vars.outputs.branch }}
      upstream-version: ${{ steps.vars.outputs.upstream-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate and parse version
        id: vars
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BRANCH="${{ github.event.inputs.branch }}"

          # Validate version format: vX.Y.Z+rhaiv.N
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+rhaiv\.[0-9]+$ ]]; then
            echo "ERROR: Invalid version format. Expected: vX.Y.Z+rhaiv.N (e.g., v0.3.0+rhaiv.1)"
            exit 1
          fi

          if [[ -z "$BRANCH" ]]; then
            echo "ERROR: Branch input must not be empty."
            exit 1
          fi

          # Extract upstream version (e.g., v0.3.0+rhaiv.1 -> 0.3.0)
          UPSTREAM_VERSION=$(echo "$VERSION" | sed 's/^v//' | cut -d'+' -f1)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "upstream-version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT

          echo "Release version: $VERSION"
          echo "Upstream version: $UPSTREAM_VERSION"
          echo "Release branch: $BRANCH"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create or update release branch
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"
          BRANCH="${{ steps.vars.outputs.branch }}"
          CURRENT_SHA="${{ github.sha }}"

          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Using existing branch: $BRANCH"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            echo "Creating new branch: $BRANCH from main"
            git checkout -B "$BRANCH" "$CURRENT_SHA"
          fi

          # Update version in __init__.py to rhai version
          sed -i "s/^__version__ = \".*\"/__version__ = \"$VERSION\"/" kubeflow/__init__.py

          echo "Updated kubeflow/__init__.py:"
          cat kubeflow/__init__.py

          # Pin dependency versions from lock file for reproducible release.
          python .github/scripts/pin_dependencies.py

          # Regenerate lock file so its recorded constraints match the
          # pinned pyproject.toml. Without this, `uv lock --check` in the
          # build job would fail because pyproject.toml now says ==X.Y.Z
          # but the lock file still records >=X.Y.Z as the input constraint.
          uv lock

          # Regenerate requirements.txt from the pinned lock file.
          # --locked fails if uv.lock is stale vs pyproject.toml, preventing
          # silent re-resolution during a release.
          uv export --locked --format requirements-txt > requirements.txt

          # Verify pinned dependencies install correctly.
          uv sync --frozen

          git add kubeflow/__init__.py requirements.txt pyproject.toml uv.lock
          git commit -m "chore: Set version to $VERSION and pin dependencies for release" || echo "No changes to commit"
          git push origin "$BRANCH"

  build:
    name: Build package
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup build environment
        run: |
          make verify

      - name: Run unit tests
        run: |
          make test-python

      - name: Verify version
        run: |
          EXPECTED_VERSION="${{ needs.prepare.outputs.version }}"
          CODE_VERSION="$(python -c "import kubeflow; print(kubeflow.__version__)")"
          echo "Expected version: $EXPECTED_VERSION"
          echo "Code version: $CODE_VERSION"
          if [[ "$EXPECTED_VERSION" != "$CODE_VERSION" ]]; then
            echo "ERROR: Version mismatch!"
            exit 1
          fi
          echo "Version verified: $EXPECTED_VERSION"

      - name: Build package
        run: |
          uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.prepare.outputs.version }}
          path: dist/

  create-tag:
    name: Create and push tag
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.branch }}
      - name: Create tag
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "Creating tag: $VERSION"

          if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
            echo "Tag $VERSION already exists. Skipping"
            exit 0
          fi
          git tag "$VERSION"
          git push origin "$VERSION"

  github-release:
    name: Create GitHub Release
    needs: [prepare, build, create-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.branch }}
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.prepare.outputs.version }}
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*
